nameOverride: ""
fullnameOverride: ""

authService:
  replicaCount: 2

  image:
    repository: ghcr.io/colzphml/pkce_istio_external
    tag: ""
    pullPolicy: IfNotPresent

  imagePullSecrets: []

  podAnnotations:
    sidecar.istio.io/inject: "true"
  podLabels: {}

  serviceAccount:
    create: true
    name: ""
    annotations: {}

  service:
    type: ClusterIP
    annotations: {}
    httpPort: 8080
    grpcPort: 9090

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi

  metrics:
    serviceMonitor:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
      labels: {}

  networkPolicy:
    enabled: true
    gatewayNamespace: istio-ingress
    monitoringNamespaceSelector: {}

  config:
    logLevel: info
    oidc:
      issuerURL: https://keycloak.example.com/realms/main
      clientID: oidc-auth
      clientSecret: ""
      existingSecret: ""
      existingSecretKey: client-secret
      scopes:
        - openid
        - profile
        - email
        - offline_access
      callbackPath: /_auth/callback
      loginPath: /_auth/login
      logoutPath: /_auth/logout
      postLogoutPath: /
      backchannelPath: /_auth/backchannel-logout
      loginStateTTL: 10m
      refreshWindow: 2m
      httpTimeout: 5s
      clockSkew: 30s
      accessTokenAudiences: []

    session:
      allowedHosts:
        - app.example.com
      cookieName: __Host-oidc_session
      cookieDomain: ""
      cookieSecure: true
      cookieSameSite: Lax
      maxLifetime: 12h
      minAccessTokenTTL: 10s

    redis:
      mode: ""
      addresses: []
      masterName: mymaster
      username: authsvc
      sentinelUsername: authsvc
      password: ""
      sentinelPassword: ""
      existingPasswordSecret: ""
      existingPasswordSecretKey: password
      existingSentinelPasswordSecret: ""
      existingSentinelPasswordSecretKey: password
      db: 0
      keyPrefix: "oidc:"
      dialTimeout: 2s
      readTimeout: 2s
      writeTimeout: 2s
      poolSize: 64
      minIdleConns: 16
      refreshLockTTL: 15s
      refreshLockWaitTimeout: 2s
      refreshLockPollInterval: 50ms
      tls:
        enabled: true
        serverName: ""
        insecureSkipVerify: false
        existingSecret: ""
        caSecretKey: ca.crt
        certSecretKey: tls.crt
        keySecretKey: tls.key
        useClientCert: false

gateway:
  enabled: true
  namespace: istio-ingress
  name: shared-gateway
  sectionName: https
  hostnames:
    - app.example.com
  pathPrefix: /_auth

istio:
  peerAuthentication:
    enabled: true
    mode: STRICT
  serviceEntry:
    enabled: false
    hosts:
      - keycloak.example.com
    ports:
      - number: 443
        name: https
        protocol: TLS

redis:
  enabled: true
  fullnameOverride: ""
  architecture: replication

  auth:
    enabled: true
    sentinel: true
    acl:
      enabled: true
      sentinel: true
      users:
        - username: authsvc
          enabled: "on"
          commands: "+@all"
          keys: "~oidc:*"
          channels: "&*"
      userSecret: ""

  commonConfiguration: |-
    appendonly yes
    save ""
    maxmemory-policy noeviction
    lazyfree-lazy-user-del yes

  master:
    disableCommands:
      - FLUSHDB
      - FLUSHALL
    service:
      ports:
        redis: 6379
    persistence:
      enabled: true
      size: 20Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  replica:
    replicaCount: 2
    persistence:
      enabled: true
      size: 20Gi
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  sentinel:
    enabled: true
    masterSet: mymaster
    quorum: 2
    downAfterMilliseconds: 5000
    failoverTimeout: 60000
    service:
      ports:
        redis: 6379
        sentinel: 26379
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi

  tls:
    enabled: true
    authClients: false
    autoGenerated: true
    certFilename: tls.crt
    certKeyFilename: tls.key
    certCAFilename: ca.crt

  metrics:
    enabled: true
    serviceMonitor:
      enabled: false
