{{- if .Values.authService.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "oidc-auth.serviceAccountName" . }}
  labels:
    {{- include "oidc-auth.labels" . | nindent 4 }}
  {{- with .Values.authService.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
