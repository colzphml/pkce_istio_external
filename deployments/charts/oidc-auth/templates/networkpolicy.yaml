{{- if .Values.authService.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "oidc-auth.fullname" . }}
  labels:
    {{- include "oidc-auth.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "oidc-auth.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.authService.networkPolicy.gatewayNamespace | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.authService.service.httpPort }}
        - protocol: TCP
          port: {{ .Values.authService.service.grpcPort }}
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.authService.service.httpPort }}
        - protocol: TCP
          port: {{ .Values.authService.service.grpcPort }}
    {{- if .Values.authService.metrics.serviceMonitor.enabled }}
    - from:
        - namespaceSelector:
            {{- toYaml .Values.authService.networkPolicy.monitoringNamespaceSelector | nindent 12 }}
      ports:
        - protocol: TCP
          port: {{ .Values.authService.service.httpPort }}
    {{- end }}
  egress:
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: {{ .Values.authService.service.httpPort }}
        - protocol: TCP
          port: {{ .Values.authService.service.grpcPort }}
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 6379
        - protocol: TCP
          port: 26379
{{- end }}
